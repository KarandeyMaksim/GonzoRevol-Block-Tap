name: gonzorevol_block_tap
description: "GonzoRevol Block Tap"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Persistence
  shared_preferences: ^2.5.5

  # Audio & haptics
  audioplayers: ^6.7.1
  vibration: ^3.2.0

  # Monetization
  in_app_purchase: ^3.3.0
  in_app_purchase_android: ^0.5.0
  startapp_sdk: ^1.0.1
  appmetrica_plugin: ^4.0.0

  # Utilities
  url_launcher: ^6.3.1
  intl: ^0.20.2
  collection: ^1.19.1
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/payments/
    - assets/icons/
    - assets/audio/
